# X Marketing Engine - スマート自動化ワークフロー
#
# 特徴:
# - 毎朝JST 06:00にリサーチ→テーマ選定→投稿自動生成
# - 1日3回投稿（morning 08:00 / noon 12:00 / night 21:00）
# - X Premium対応（文字数上限25,000字、スレッド投稿対応）
# - Thompson Samplingによるテーマ最適化
# - プール枯渇時はDiscordに通知

name: Smart X Marketing

permissions:
  contents: write

on:
  # [PAUSED 2026-03-10] 自動投稿を一時停止。仕組み再構築のため手動実行のみに変更。
  # schedule:
  #   # 毎朝リサーチ＆投稿生成（daily_setup）
  #   - cron: '0 21 * * *'  # JST 06:00 (リサーチ→生成→プール投入)
  #   # 1日3回投稿（smart_post）
  #   - cron: '0 23 * * *'  # JST 08:00 (朝の通勤時間)
  #   - cron: '0 3 * * *'   # JST 12:00 (昼休み)
  #   - cron: '0 12 * * *'  # JST 21:00 (夜のリラックス - ER最強スロット)

  workflow_dispatch:
    inputs:
      action:
        description: 'アクション'
        required: true
        type: choice
        options:
          - smart_post
          - generate
          - full_cycle

env:
  X_API_KEY: ${{ secrets.X_API_KEY }}
  X_API_SECRET: ${{ secrets.X_API_SECRET }}
  X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
  X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
  GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}

jobs:
  smart_post:
    if: github.event.schedule != '0 21 * * *' || github.event.inputs.action == 'smart_post'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest changes
        run: git pull origin ${{ github.ref_name }} || true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Check pool and notify if low
        run: |
          # 投稿プール残数を確認
          POOL_COUNT=$(cat content/ab_test_pool.yml 2>/dev/null | grep -c "status: active" || echo "0")
          echo "📦 投稿プール残数: $POOL_COUNT"
          if [ "$POOL_COUNT" -lt "3" ]; then
            echo "⚠️ プール枯渇！Discordに緊急通知を送信..."
            npx ts-node scripts/notify_discord.ts daily-report || true
          fi

      - name: Smart post execution
        run: npm run smart-post
        continue-on-error: true

      # ===== メトリクス収集はdaily_setupのみ（月間API上限節約）=====
      # smart_postではメトリクス収集をスキップ
      # daily_setup（1日1回 JST 06:00）で一括収集

      # XAS分析は既存メトリクスがあれば実行可能
      - name: Analyze and learn
        run: |
          echo "🧠 分析→学習→推薦を実行..."
          npx ts-node scripts/analyze_hypothesis.ts all || true
        continue-on-error: true

      - name: Copy data to dashboard
        run: |
          cp content/post_history.json dashboard/data.json 2>/dev/null || true
          cp content/account_stats.json dashboard/account.json 2>/dev/null || true
          cp content/overseas_insights.json dashboard/overseas.json 2>/dev/null || true
          npx ts-node -e "const y=require('js-yaml'),f=require('fs');const p=y.load(f.readFileSync('content/ab_test_pool.yml','utf-8'));const s=p.posts.filter(x=>x.status==='active').map(x=>({id:x.id,scheduled_date:x.scheduled_date,slot:x.slot,theme:x.theme,type:x.type,variant_a:x.variants?.A?.content||'',variant_b:x.variants?.B?.content||''}));f.writeFileSync('dashboard/pool.json',JSON.stringify(s,null,2))" 2>/dev/null || true

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/ dashboard/
          git diff --staged --quiet || git commit -m "🤖 Smart post $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || true

  # 朝のリサーチ＆自動生成（1日1回、JST 06:00）
  daily_setup:
    if: github.event.schedule == '0 21 * * *' || github.event.inputs.action == 'full_cycle' || github.event.inputs.action == 'generate'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git pull origin ${{ github.ref_name }} || true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # メトリクス収集は毎朝実行（バルクAPIで月6-12回で収まる）
      - name: Collect metrics (daily)
        run: npm run metrics || true
        continue-on-error: true

      # XAS分析 → 学習更新 → 推薦（毎朝実行で即座に反映）
      - name: Analyze hypothesis and update learning
        run: npx ts-node scripts/analyze_hypothesis.ts all || true
        continue-on-error: true

      - name: Update winning patterns (numeric analysis)
        run: npx ts-node scripts/analyze_performance.ts update-winning || true
        continue-on-error: true

      - name: Multi-LLM deep analysis
        run: npm run analyze-llm || true
        continue-on-error: true

      - name: Grok content analysis (daily, no API limit)
        run: npm run analyze-grok || true
        continue-on-error: true

      - name: Get account stats
        run: npm run account-stats || true
        continue-on-error: true

      - name: Research overseas trends
        run: npm run research-overseas || true
        continue-on-error: true

      - name: Watch influencers and analyze patterns
        run: |
          npx ts-node scripts/watch_influencers.ts watch || true
          npx ts-node scripts/watch_influencers.ts analyze-manual || true
        continue-on-error: true

      # ===== 日次自動投稿生成（リサーチ後に実行）=====
      - name: Daily auto-generate posts
        run: |
          echo "🤖 日次自動投稿生成..."
          npx ts-node scripts/daily_generate.ts || true
        continue-on-error: true

      # ===== リプライ提案（対話による認知拡大）=====
      - name: Suggest replies to influencers
        run: |
          echo "💬 インフルエンサーへのリプライ提案..."
          npx ts-node scripts/suggest_replies.ts || true
        continue-on-error: true

      - name: Check pool status and notify
        run: |
          POOL_COUNT=$(cat content/ab_test_pool.yml 2>/dev/null | grep -c "status: active" || echo "0")
          echo "📦 投稿プール残数: $POOL_COUNT"
          if [ "$POOL_COUNT" -lt "6" ]; then
            echo "⚠️ プール残数が少ないです。Discordに通知..."
            npx ts-node scripts/notify_discord.ts theme-candidates || true
          fi

      - name: Copy data to dashboard
        run: |
          cp content/post_history.json dashboard/data.json 2>/dev/null || true
          cp content/account_stats.json dashboard/account.json 2>/dev/null || true
          cp content/overseas_insights.json dashboard/overseas.json 2>/dev/null || true
          cp content/winning_patterns.yml dashboard/patterns.yml 2>/dev/null || true
          npx ts-node -e "const y=require('js-yaml'),f=require('fs');const p=y.load(f.readFileSync('content/ab_test_pool.yml','utf-8'));const s=p.posts.filter(x=>x.status==='active').map(x=>({id:x.id,scheduled_date:x.scheduled_date,slot:x.slot,theme:x.theme,type:x.type,variant_a:x.variants?.A?.content||'',variant_b:x.variants?.B?.content||''}));f.writeFileSync('dashboard/pool.json',JSON.stringify(s,null,2))" 2>/dev/null || true

          # ログファイルを生成
          echo "{" > dashboard/logs.json
          echo "  \"last_run\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"," >> dashboard/logs.json
          echo "  \"job\": \"daily_setup\"," >> dashboard/logs.json
          echo "  \"status\": \"success\"," >> dashboard/logs.json
          echo "  \"actions\": {" >> dashboard/logs.json
          echo "    \"metrics_collected\": true," >> dashboard/logs.json
          echo "    \"patterns_updated\": true," >> dashboard/logs.json
          echo "    \"overseas_researched\": true," >> dashboard/logs.json
          echo "    \"influencers_watched\": true," >> dashboard/logs.json
          echo "    \"posts_generated\": true" >> dashboard/logs.json
          echo "  }" >> dashboard/logs.json
          echo "}" >> dashboard/logs.json

      - name: Commit daily setup
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/ dashboard/
          git diff --staged --quiet || git commit -m "🌅 Daily setup $(date -u +%Y-%m-%d)"
          git push || true
