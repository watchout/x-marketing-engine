# X Marketing Engine - 自動化ワークフロー v2.1
#
# 日次サイクル（1日5投稿 + 海外リサーチ）:
#   05:45 JST - メトリクス収集
#   06:00 JST - 海外AIトレンドリサーチ（Grok）
#   07:00 JST - 投稿生成（5件分、海外インサイト含む）
#   08:00 JST - 朝投稿
#   10:00 JST - 午前投稿
#   12:00 JST - 昼投稿
#   18:00 JST - 夕方投稿
#   21:00 JST - 夜投稿
#
# 必要なSecrets:
#   X_API_KEY, X_API_SECRET, X_ACCESS_TOKEN, X_ACCESS_SECRET
#   OPENAI_API_KEY, GOOGLE_AI_API_KEY
#   GROK_API_KEY (オプション)

name: X Marketing Automation

permissions:
  contents: write

on:
  # [PAUSED 2026-03-10] 自動投稿を一時停止。仕組み再構築のため手動実行のみに変更。
  # schedule:
  #   # メトリクス収集 (05:45 JST = 20:45 UTC前日)
  #   - cron: '45 20 * * *'
  #   # 海外リサーチ (06:00 JST = 21:00 UTC前日)
  #   - cron: '0 21 * * *'
  #   # 投稿生成 (07:00 JST = 22:00 UTC前日)
  #   - cron: '0 22 * * *'
    # 朝投稿 (08:00 JST = 23:00 UTC前日)
    - cron: '0 23 * * *'
    # 午前投稿 (10:00 JST = 01:00 UTC)
    - cron: '0 1 * * *'
    # 昼投稿 (12:00 JST = 03:00 UTC)
    - cron: '0 3 * * *'
    # 夕方投稿 (18:00 JST = 09:00 UTC)
    - cron: '0 9 * * *'
    # 夜投稿 (21:00 JST = 12:00 UTC)
    - cron: '0 12 * * *'
  
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        default: 'generate'
        type: choice
        options:
          - generate
          - research_overseas
          - post_morning
          - post_mid_morning
          - post_noon
          - post_evening
          - post_night
          - analyze
          - suggest_replies
          - full_cycle

env:
  X_API_KEY: ${{ secrets.X_API_KEY }}
  X_API_SECRET: ${{ secrets.X_API_SECRET }}
  X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
  X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
  GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

jobs:
  # ===== メトリクス収集 + 分析 (05:45 JST) =====
  analyze:
    if: github.event.schedule == '45 20 * * *' || github.event.inputs.action == 'analyze' || github.event.inputs.action == 'full_cycle'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      
      - name: Collect metrics
        run: npm run metrics
        continue-on-error: true
      
      - name: Get account stats
        run: npm run account-stats
        continue-on-error: true
      
      - name: Analyze performance
        run: npm run analyze
        continue-on-error: true
      
      - name: Copy data to dashboard
        run: |
          cp content/post_history.json dashboard/data.json 2>/dev/null || true
          cp content/overseas_insights.json dashboard/overseas.json 2>/dev/null || true
          cp content/account_stats.json dashboard/account.json 2>/dev/null || true
      
      - name: Commit updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/ dashboard/
          git diff --staged --quiet || git commit -m "📊 Daily analysis"
          git push

  # ===== 海外リサーチ (06:00 JST) =====
  research_overseas:
    if: github.event.schedule == '0 21 * * *' || github.event.inputs.action == 'research_overseas' || github.event.inputs.action == 'full_cycle'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git pull origin ${{ github.ref_name }} || true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      
      - name: Research overseas AI trends with Grok
        run: npm run research-overseas
        continue-on-error: true
      
      - name: Copy data to dashboard
        run: |
          cp content/post_history.json dashboard/data.json 2>/dev/null || true
          cp content/overseas_insights.json dashboard/overseas.json 2>/dev/null || true
      
      - name: Commit overseas insights
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/ dashboard/
          git diff --staged --quiet || git commit -m "🌐 Overseas AI trends research"
          git push

  # ===== 投稿生成 (07:00 JST) =====
  generate:
    if: github.event.schedule == '0 22 * * *' || github.event.inputs.action == 'generate' || github.event.inputs.action == 'full_cycle'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git pull origin ${{ github.ref_name }} || true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      
      - name: Generate posts with Multi-LLM (5 posts)
        run: |
          npm run generate
          npm run generate
          npm run generate
          npm run generate
          npm run generate
      
      - name: Copy data to dashboard
        run: cp content/post_history.json dashboard/data.json
      
      - name: Commit posts
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/ dashboard/
          git diff --staged --quiet || git commit -m "🧠 Generated 5 posts"
          git push

  # ===== 朝投稿 (08:00 JST) =====
  post_morning:
    if: github.event.schedule == '0 23 * * *' || github.event.inputs.action == 'post_morning' || github.event.inputs.action == 'full_cycle'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git pull origin ${{ github.ref_name }} || true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      
      - name: Post morning content
        run: npm run post:morning
      
      - name: Copy data to dashboard
        run: cp content/post_history.json dashboard/data.json
      
      - name: Commit history
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/ dashboard/
          git diff --staged --quiet || git commit -m "📤 08:00 post"
          git push

  # ===== 午前投稿 (10:00 JST) =====
  post_mid_morning:
    if: github.event.schedule == '0 1 * * *' || github.event.inputs.action == 'post_mid_morning' || github.event.inputs.action == 'full_cycle'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git pull origin ${{ github.ref_name }} || true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      
      - name: Post mid-morning content
        run: npm run post:mid_morning
      
      - name: Copy data to dashboard
        run: cp content/post_history.json dashboard/data.json
      
      - name: Commit history
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/ dashboard/
          git diff --staged --quiet || git commit -m "📤 10:00 post"
          git push

  # ===== 昼投稿 (12:00 JST) =====
  post_noon:
    if: github.event.schedule == '0 3 * * *' || github.event.inputs.action == 'post_noon' || github.event.inputs.action == 'full_cycle'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git pull origin ${{ github.ref_name }} || true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      
      - name: Post noon content
        run: npm run post:noon
      
      - name: Copy data to dashboard
        run: cp content/post_history.json dashboard/data.json
      
      - name: Commit history
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/ dashboard/
          git diff --staged --quiet || git commit -m "📤 12:00 post"
          git push

  # ===== 夕方投稿 (18:00 JST) =====
  post_evening:
    if: github.event.schedule == '0 9 * * *' || github.event.inputs.action == 'post_evening' || github.event.inputs.action == 'full_cycle'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git pull origin ${{ github.ref_name }} || true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      
      - name: Post evening content
        run: npm run post:evening
      
      - name: Copy data to dashboard
        run: cp content/post_history.json dashboard/data.json
      
      - name: Commit history
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/ dashboard/
          git diff --staged --quiet || git commit -m "📤 18:00 post"
          git push

  # ===== 夜投稿 (21:00 JST) =====
  post_night:
    if: github.event.schedule == '0 12 * * *' || github.event.inputs.action == 'post_night' || github.event.inputs.action == 'full_cycle'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git pull origin ${{ github.ref_name }} || true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      
      - name: Post night content
        run: npm run post:night
      
      - name: Copy data to dashboard
        run: cp content/post_history.json dashboard/data.json
      
      - name: Commit history
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/ dashboard/
          git diff --staged --quiet || git commit -m "📤 21:00 post"
          git push

  # ===== リプライ提案生成 =====
  suggest_replies:
    if: github.event.inputs.action == 'suggest_replies'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      
      - name: Generate reply suggestions
        run: npm run suggest-replies
        continue-on-error: true
      
      - name: Copy data to dashboard
        run: |
          cp content/reply_suggestions.json dashboard/replies.json 2>/dev/null || true
          cp content/post_history.json dashboard/data.json 2>/dev/null || true
      
      - name: Commit suggestions
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add content/ dashboard/
          git diff --staged --quiet || git commit -m "💬 Reply suggestions"
          git push
